[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@account-abstraction/=lib/account-abstraction/",
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
    "@layerzerolabs/lz-evm-oapp-v2/=../../node_modules/@layerzerolabs/lz-evm-oapp-v2/",
    "@layerzerolabs/lz-evm-protocol-v2/=../../node_modules/@layerzerolabs/lz-evm-protocol-v2/",
    "@layerzerolabs/oapp-evm/=../../node_modules/@layerzerolabs/oapp-evm/",
    "@layerzerolabs/lz-evm-messagelib-v2/=../../node_modules/@layerzerolabs/lz-evm-messagelib-v2/",
    "solidity-bytes-utils/=../../node_modules/solidity-bytes-utils/",
    "@fhevm/solidity/=../../node_modules/@fhevm/solidity/",
    "encrypted-types/=../../node_modules/.pnpm/encrypted-types@0.0.4/node_modules/encrypted-types/",
]

via_ir = true
optimizer = true
allow_paths = ["../../node_modules"]

# Ethereum Sepolia network configuration
[rpc_endpoints]
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
