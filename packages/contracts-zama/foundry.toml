[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
evm_version = "cancun"
remappings = [
    "forge-fhevm/=lib/forge-fhevm/src/",
    "@fhevm/solidity/=lib/forge-fhevm/dependencies/@fhevm-solidity-0.11.1/",
    "@fhevm/host-contracts/=lib/forge-fhevm/src/fhevm-host/",
    "encrypted-types/=lib/forge-fhevm/dependencies/@encrypted-types-0.0.4/",
    "@openzeppelin/contracts/=lib/forge-fhevm/dependencies/@openzeppelin-contracts-5.1.0/",
    "@openzeppelin-contracts/=lib/forge-fhevm/dependencies/@openzeppelin-contracts-5.1.0/",
    "@openzeppelin-contracts-upgradeable/=lib/forge-fhevm/dependencies/@openzeppelin-contracts-upgradeable-5.1.0/",
    "@openzeppelin/confidential-contracts/=lib/forge-fhevm/dependencies/@openzeppelin-confidential-contracts-6edd293/contracts/",
    "forge-std/=lib/forge-fhevm/dependencies/forge-std-1.14.0/src/",
    "@layerzerolabs/lz-evm-oapp-v2/=../../node_modules/@layerzerolabs/lz-evm-oapp-v2/",
    "@layerzerolabs/lz-evm-protocol-v2/=../../node_modules/@layerzerolabs/lz-evm-protocol-v2/",
    "@layerzerolabs/oapp-evm/=../../node_modules/@layerzerolabs/oapp-evm/",
    "@layerzerolabs/lz-evm-messagelib-v2/=../../node_modules/@layerzerolabs/lz-evm-messagelib-v2/",
    "solidity-bytes-utils/=../../node_modules/solidity-bytes-utils/",
]

via_ir = true
optimizer = true
allow_paths = ["../../node_modules"]
